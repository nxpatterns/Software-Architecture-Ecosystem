llm:
  api_base: "http://127.0.0.1:1234/v1"
  api_key: "lmstudio"
  model: "openai/qwen/qwen3.5-9b" # The model to use
  temperature: 0
  context_window: 200000  # Maximal für Cache-Reads
  max_tokens: 20000  # Unter dem 32k Output-Limit bleiben
  max_output: 20000  # Entsprechend anpassen
  multi_line: true # If True, you can input multiple lines starting and ending with ```
  disable_telemetry: true
  execution_instructions: "To execute code on the user's machine, write a markdown code block. Specify the language after the ```. You will receive the output. Use any programming language."

# # Computer Settings
computer:
  import_computer_api: false # Gives OI a helpful Computer API designed for code interpreting language models
  offline: true # If True, will disable some online features like checking for updates
#   emit_images: True
#   verbose: True

custom_instructions: >
  Always respond in English, regardless of the query language. When you start say "profiles/qwen359.yaml".

# General Configuration
os: true
auto_run: true # If True, code will run without asking for confirmation
safe_mode: "ask" # The safety mode for the LLM â€” one of "off", "ask", "auto"
# offline: False  # If True, will disable some online features like checking for updates
# verbose: True # If True, will print detailed logs
multi_line: true # If True, you can input multiple lines starting and ending with ```
disable_telemetry: true

# Documentation
# All options: https://docs.openinterpreter.com/settings

version: 2.0.2  # Profile version (do not modify)
